<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切割 & 印+妙 排班表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface-2: #f7f8fa;
    --surface-3: #eef0f4;
    --border: #e0e3ea;
    --border-light: #d0d4dd;
    --text: #1a1e2e;
    --text-secondary: #4a5068;
    --text-muted: #8891a5;
    --text-dim: #b0b7c8;

    --cut-primary: #3b6df0;
    --cut-light: #3b6df012;
    --cut-bg: #eef3ff;
    --cut-border: #c5d5f8;
    --cut-tag-text: #2a4fb0;

    --print-primary: #e07020;
    --print-light: #e0702010;
    --print-bg: #fff5ee;
    --print-border: #f0d0b0;
    --print-tag-text: #a05218;

    --accent: #6c5ce7;
    --success: #22c55e;
    --danger: #ef4444;

    --header-bg: linear-gradient(135deg, #3b6df0 0%, #6c5ce7 100%);

    --shadow-xs: 0 1px 2px rgba(0,0,0,.04);
    --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.10);

    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 5px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* ═══ Header ═══ */
  .app-header {
    background: var(--header-bg);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(59,109,240,.25);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 42px; height: 42px;
    background: rgba(255,255,255,.2);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1px solid rgba(255,255,255,.25);
  }

  .header-title { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .header-subtitle { font-size: 12px; color: rgba(255,255,255,.72); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .week-nav {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: var(--radius-sm);
    padding: 4px 6px;
  }

  .week-nav button {
    background: none; border: none; color: rgba(255,255,255,.8);
    cursor: pointer; width: 30px; height: 30px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-size: 14px;
  }
  .week-nav button:hover { background: rgba(255,255,255,.15); color: #fff; }

  .week-label {
    font-size: 13px; font-weight: 600; color: #fff;
    min-width: 170px; text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  .btn {
    padding: 7px 14px; border-radius: var(--radius-xs);
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.12); color: #fff;
    font-family: inherit; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 5px;
    backdrop-filter: blur(8px);
  }
  .btn:hover { background: rgba(255,255,255,.22); }

  .btn-modal { background: var(--surface-3); border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-modal:hover { background: var(--border); }

  .btn-primary { background: var(--cut-primary); border-color: var(--cut-primary); color: #fff; }
  .btn-primary:hover { background: #2f5cd8; }

  /* ═══ Legend ═══ */
  .legend-bar {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    box-shadow: var(--shadow-xs);
  }

  .legend-item { display: flex; align-items: center; gap: 7px; font-weight: 500; color: var(--text-secondary); }

  .legend-dot { width: 14px; height: 14px; border-radius: 4px; }
  .legend-dot.cut { background: var(--cut-primary); }
  .legend-dot.print { background: var(--print-primary); }

  .legend-people { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

  .person-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .person-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ═══ Schedule Grid ═══ */
  .schedule-wrapper { padding: 24px 32px 40px; }

  .schedule-grid {
    display: grid;
    grid-template-columns: 110px repeat(7, 1fr);
    gap: 0;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    min-width: 920px;
    border: 1px solid var(--border);
  }

  /* ═══ Header Row ═══ */
  .grid-header {
    background: var(--surface-2);
    padding: 14px 8px; text-align: center;
    font-weight: 600; font-size: 14px;
    border-bottom: 2px solid var(--cut-primary);
    border-right: 1px solid var(--border);
  }
  .grid-header:last-child { border-right: none; }

  .grid-header.time-col {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
  }

  .grid-header.is-today { background: var(--cut-bg); }

  .day-name { font-size: 15px; color: var(--text); }

  .day-date {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .today-badge {
    display: inline-block;
    background: var(--cut-primary); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
    margin-left: 5px; vertical-align: middle;
    letter-spacing: .5px;
  }

  /* ═══ Time Column ═══ */
  .time-cell {
    background: var(--surface-2);
    padding: 10px 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    border-right: 2px solid var(--border-light);
    border-bottom: 1px solid var(--border);
  }

  .time-range {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--text); text-align: center; line-height: 1.4;
  }

  .time-note { font-size: 10px; color: var(--text-muted); text-align: center; }

  /* ═══ Shift Cell ═══ */
  .shift-cell {
    background: var(--surface);
    padding: 8px 7px; min-height: 78px;
    display: flex; flex-direction: column; gap: 6px;
    transition: background .12s; cursor: pointer;
    position: relative;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .shift-cell:nth-child(8n) { border-right: none; }
  .shift-cell:hover { background: #f5f7ff; }

  .shift-cell.no-shift { background: var(--surface-3); cursor: pointer; }
  .shift-cell.no-shift:hover { background: var(--border); }

  .shift-cell.is-today-col { background: #fafbff; }
  .shift-cell.is-today-col:hover { background: #f0f3ff; }

  /* ═══ Role Groups ═══ */
  .role-group { display: flex; flex-direction: column; gap: 3px; }

  .role-label {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    padding: 1px 5px; border-radius: 3px;
    display: inline-flex; align-items: center; gap: 4px;
    width: fit-content;
  }
  .role-label.cut { color: var(--cut-primary); background: var(--cut-light); }
  .role-label.print { color: var(--print-primary); background: var(--print-light); }
  .role-label svg { width: 9px; height: 9px; }

  .person-tags { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 1px; }

  .person-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: var(--radius-xs);
    font-size: 13px; font-weight: 600;
    position: relative; transition: all .12s;
    border: 1px solid;
  }

  .person-tag .pname { font-weight: 600; }
  .person-tag .note { font-size: 10px; color: var(--text-muted); font-weight: 400; }

  .person-tag:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  .tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--text); color: #fff;
    padding: 4px 10px; border-radius: var(--radius-xs);
    font-size: 11px; font-weight: 500;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: all .15s; z-index: 50;
    box-shadow: var(--shadow-md);
  }
  .tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: var(--text);
  }

  .role-divider { height: 1px; background: var(--border); margin: 1px 0; }

  /* ═══ Edit Modal ═══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,24,40,.35);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 440px; max-width: 95vw;
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,.04);
    animation: modalIn .2s ease;
  }

  @keyframes modalIn {
    from { transform: scale(.96) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--text); }

  .modal-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; width: 30px; height: 30px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .modal-close:hover { background: var(--surface-3); color: var(--text); }

  .modal-body { padding: 18px 22px; }

  .form-section { margin-bottom: 18px; }
  .form-section:last-child { margin-bottom: 0; }

  .form-section-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .form-section-title.cut { color: var(--cut-primary); }
  .form-section-title.print { color: var(--print-primary); }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }

  .form-input {
    flex: 1; padding: 8px 12px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text);
    font-family: inherit; font-size: 14px;
    transition: all .15s;
  }
  .form-input:focus { outline: none; border-color: var(--cut-primary); box-shadow: 0 0 0 3px rgba(59,109,240,.1); }
  .form-input::placeholder { color: var(--text-dim); }
  .form-input.note-input { flex: 0.7; font-size: 12px; }

  .btn-add-person {
    background: none; border: 1px dashed var(--border-light);
    color: var(--text-muted); padding: 6px 12px;
    border-radius: var(--radius-xs); cursor: pointer;
    font-size: 12px; font-family: inherit; transition: all .12s;
  }
  .btn-add-person:hover { border-color: var(--cut-primary); color: var(--cut-primary); background: var(--cut-light); }

  .btn-remove {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 15px; width: 28px; height: 28px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    opacity: 0.5; transition: all .12s; flex-shrink: 0;
  }
  .btn-remove:hover { opacity: 1; background: #fef2f2; }

  .modal-footer {
    padding: 14px 22px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* ═══ Notes ═══ */
  .notes-section {
    margin-top: 20px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 22px; box-shadow: var(--shadow-sm);
  }

  .notes-title {
    font-size: 13px; font-weight: 700;
    color: var(--text-secondary); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }

  .notes-content { font-size: 13px; line-height: 1.8; color: var(--text-muted); }

  /* ═══ Responsive ═══ */
  @media (max-width: 768px) {
    .app-header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .schedule-wrapper { padding: 12px; }
    .schedule-grid { grid-template-columns: 80px repeat(7, minmax(100px, 1fr)); }
    .legend-bar { padding: 10px 16px; flex-wrap: wrap; gap: 10px; }
    .legend-people { margin-left: 0; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="logo-icon">✂</div>
    <div>
      <div class="header-title">排班管理系統</div>
      <div class="header-subtitle">切割 & 印刷+妙麗 人員班表</div>
    </div>
  </div>
  <div class="header-right">
    <div class="week-nav">
      <button onclick="changeWeek(-1)" title="上一週">◀</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="changeWeek(1)" title="下一週">▶</button>
    </div>
    <button class="btn" onclick="resetToDefault()" title="還原預設資料">↺ 還原預設</button>
  </div>
</header>

<div class="legend-bar">
  <div class="legend-item">
    <div class="legend-dot cut"></div>
    <span>切割</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot print"></div>
    <span>印+妙</span>
  </div>
  <div class="legend-people" id="legendPeople"></div>
</div>

<div class="schedule-wrapper">
  <div class="schedule-grid" id="scheduleGrid"></div>
  <div class="notes-section">
    <div class="notes-title">📋 備註</div>
    <div class="notes-content">
      切為海格+拆下料架，兩個切則可以一人操作一台。<br>
      印+妙為大灰+妙麗+存海格檔案。若只有印可做則去操作一台切割機，有空就切。<br>
      優先以讓機器保持動作為主，先放紙開始印+妙切再去做收紙或其他，速度使效率最大化。<br>
      當有檔案 QR 錯需打到 QRCode Notion 表格。
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">編輯班次</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-modal" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['一','二','三','四','五','六','日'];
const TIME_SLOTS = [
  { id: 'early', label: '開機', time: '上班前', note: '' },
  { id: 't1', label: '08:00', time: '10:30', note: '' },
  { id: 't2', label: '10:30', time: '12:00', note: '' },

const PERSON_COLORS = {
  '黑': { bg: '#e8eeff', border: '#b8ccf8', text: '#2952a3' },

const DEFAULT_DATA = {
  'early-一': { cut: [{name:'黑',note:'主要'}], print: [{name:'黑',note:''}] },
  'early-二': { cut: [{name:'黑',note:'主要'}], print: [{name:'黑',note:''}] },

  't2-二': { cut: [{name:'小妤',note:''},{name:'黑',note:''}], print: [{name:'黑',note:''}] },

  't3-二': { cut: [{name:'黑',note:''}], print: [{name:'小妤',note:'+代工'}] },

  't3-四': { cut: [{name:'安',note:''},{name:'尤',note:'預'}], print: [{name:'黑',note:''}] },

};

let scheduleData = {}, currentWeekOffset = 0, editingCell = null;

function init() { loadData(); updateWeekLabel(); renderGrid(); renderLegend(); }

function loadData() {
  const saved = localStorage.getItem('scheduleData_v2');
  scheduleData = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() { localStorage.setItem('scheduleData_v2', JSON.stringify(scheduleData)); }

function resetToDefault() {
  if (confirm('確定要還原為預設班表嗎？目前的修改將會遺失。')) {
    scheduleData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(); renderGrid(); renderLegend();
  }
}

function getWeekDates(offset) {
  const now = new Date(), dow = now.getDay();
  const mo = new Date(now);
  mo.setDate(now.getDate() + (dow === 0 ? -6 : 1 - dow) + offset * 7);
  return Array.from({length:7}, (_,i) => { const d = new Date(mo); d.setDate(mo.getDate()+i); return d; });
}

function updateWeekLabel() {
  const d = getWeekDates(currentWeekOffset);
  const f = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('weekLabel').textContent = `${d[0].getFullYear()} ${f(d[0])} — ${f(d[6])}`;
}

function changeWeek(dir) { currentWeekOffset += dir; updateWeekLabel(); renderGrid(); }

function ps(name) {
  const c = PERSON_COLORS[name];
  return c ? `background:${c.bg};border-color:${c.border};color:${c.text}` : 'background:var(--surface-3);border-color:var(--border);color:var(--text-secondary)';
}

function renderGrid() {
  const g = document.getElementById('scheduleGrid'); g.innerHTML = '';
  const dates = getWeekDates(currentWeekOffset);
  const today = new Date(); today.setHours(0,0,0,0);

  g.innerHTML += `<div class="grid-header time-col">時段</div>`;
  dates.forEach((date, i) => {
    const t = date.toDateString() === today.toDateString();
    g.innerHTML += `<div class="grid-header${t?' is-today':''}"><div class="day-name">${DAYS[i]}${t?'<span class="today-badge">TODAY</span>':''}</div><div class="day-date">${date.getMonth()+1}/${date.getDate()}</div></div>`;
  });

  TIME_SLOTS.forEach(slot => {
    g.innerHTML += `<div class="time-cell"><div class="time-range">${slot.label}${slot.time?'<br>~ '+slot.time:''}</div>${slot.note?`<div class="time-note">${slot.note}</div>`:''}</div>`;

    DAYS.forEach((day, di) => {
      const key = `${slot.id}-${day}`, cd = scheduleData[key];
      const tc = dates[di].toDateString() === today.toDateString() ? ' is-today-col' : '';

      if (!cd) { g.innerHTML += `<div class="shift-cell no-shift${tc}" onclick="openEdit('${key}','${slot.label} ~ ${slot.time}','${day}')"></div>`; return; }

      let h = `<div class="shift-cell${tc}" onclick="openEdit('${key}','${slot.label} ~ ${slot.time}','${day}')">`;

      if (cd.cut?.length) {
        h += `<div class="role-group"><div class="role-label cut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg> 切割</div><div class="person-tags">`;
        cd.cut.forEach(p => { h += `<span class="person-tag" style="${ps(p.name)}"><span class="pname">${p.name}</span>${p.note?`<span class="note">${p.note}</span><span class="tooltip">${p.note}</span>`:''}</span>`; });
        h += `</div></div>`;
      }

      if (cd.cut?.length && cd.print?.length) h += `<div class="role-divider"></div>`;

      if (cd.print?.length) {
        h += `<div class="role-group"><div class="role-label print"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg> 印+妙</div><div class="person-tags">`;
        cd.print.forEach(p => { h += `<span class="person-tag" style="${ps(p.name)}"><span class="pname">${p.name}</span>${p.note?`<span class="note">${p.note}</span><span class="tooltip">${p.note}</span>`:''}</span>`; });
        h += `</div></div>`;
      }

      if (!cd.cut?.length && !cd.print?.length) h += `<div style="color:var(--text-dim);font-size:12px;display:flex;align-items:center;justify-content:center;height:100%">點擊編輯</div>`;

      g.innerHTML += h + `</div>`;
    });
  });
}

function renderLegend() {
  const c = document.getElementById('legendPeople'), ppl = new Set();
  Object.values(scheduleData).forEach(cell => { (cell.cut||[]).forEach(p=>ppl.add(p.name)); (cell.print||[]).forEach(p=>ppl.add(p.name)); });
  c.innerHTML = [...ppl].map(n => { const cl = PERSON_COLORS[n]; return `<span class="person-chip"><span class="dot" style="background:${cl?cl.border:'#aaa'}"></span>${n}</span>`; }).join('');
}

function openEdit(key, timeLabel, day) {
  editingCell = key;
  const data = scheduleData[key] || { cut: [], print: [] };
  document.getElementById('modalTitle').textContent = `編輯｜週${day}・${timeLabel}`;

  let h = `<div class="form-section"><div class="form-section-title cut"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg> 切割人員</div><div id="cutRows">`;
  (data.cut||[]).forEach((p,i) => { h += pRow('cut',i,p.name,p.note); });
  h += `</div><button class="btn-add-person" onclick="addPerson('cut')">+ 新增切割人員</button></div>`;

  h += `<div class="form-section"><div class="form-section-title print"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg> 印+妙人員</div><div id="printRows">`;
  (data.print||[]).forEach((p,i) => { h += pRow('print',i,p.name,p.note); });
  h += `</div><button class="btn-add-person" onclick="addPerson('print')">+ 新增印+妙人員</button></div>`;

  document.getElementById('modalBody').innerHTML = h;
  document.getElementById('editModal').classList.add('active');
}

function pRow(role, i, name, note) {
  return `<div class="form-row" data-role="${role}"><input class="form-input" type="text" placeholder="姓名" value="${name||''}" data-field="name"><input class="form-input note-input" type="text" placeholder="備註（選填）" value="${note||''}" data-field="note"><button class="btn-remove" onclick="this.parentElement.remove()">✕</button></div>`;
}

function addPerson(role) {
  const c = document.getElementById(role+'Rows');
  c.insertAdjacentHTML('beforeend', pRow(role,0,'',''));
  c.lastElementChild.querySelector('input').focus();
}

function saveEdit() {
  const cut=[], print=[];
  document.querySelectorAll('#cutRows .form-row').forEach(r => { const n=r.querySelector('[data-field="name"]').value.trim(), t=r.querySelector('[data-field="note"]').value.trim(); if(n) cut.push({name:n,note:t}); });
  document.querySelectorAll('#printRows .form-row').forEach(r => { const n=r.querySelector('[data-field="name"]').value.trim(), t=r.querySelector('[data-field="note"]').value.trim(); if(n) print.push({name:n,note:t}); });
  if(!cut.length && !print.length) delete scheduleData[editingCell]; else scheduleData[editingCell] = {cut,print};
  saveData(); renderGrid(); renderLegend(); closeModal();
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); editingCell = null; }

document.getElementById('editModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.addEventListener('keydown', function(e) { if(e.key==='Escape') closeModal(); });

init();
</script>
</body>
</html>
