<html lang="zh-TW">

<title>切割 &amp; 印+妙 排班表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e4df; --surface: #f2efeb; --surface-2: #eae6e1; --surface-3: #ddd9d3;
    --border: #cdc8c1; --border-light: #bfb9b1;
    --text: #4a4540; --text-secondary: #6b655e; --text-muted: #928b82; --text-dim: #b5aea5;
    --cut-primary: #7a8fa0; --cut-cell-bg: #e8edf2; --cut-label-bg: #cdd8e2; --cut-label-text: #506878;
    --print-primary: #b08a80; --print-cell-bg: #f2e8e4; --print-label-bg: #e0cec6; --print-label-text: #7a5548;
    --combo-cell-bg: linear-gradient(135deg, #dce4ee 0%, #e8dcd6 100%);
    --combo-label-bg: linear-gradient(135deg, #b8c8d8 0%, #d4b8ac 100%);
    --combo-label-text: #fff;
    --accent: #9a8db8; --success: #8fb09a; --danger: #c08078;
    --header-bg: linear-gradient(135deg, #8a9baa 0%, #9a8db8 100%);
    --shadow-xs: 0 1px 2px rgba(80,70,60,.06); --shadow-sm: 0 1px 4px rgba(80,70,60,.08);
    --shadow-md: 0 4px 12px rgba(80,70,60,.10); --shadow-lg: 0 8px 28px rgba(80,70,60,.12);
    --radius: 12px; --radius-sm: 8px; --radius-xs: 5px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: auto; }

  .app-header { background: var(--header-bg); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(100,90,80,.18); position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-icon { width: 42px; height: 42px; background: rgba(255,255,255,.2); backdrop-filter: blur(8px); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid rgba(255,255,255,.25); }
  .header-title { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .header-subtitle { font-size: 12px; color: rgba(255,255,255,.72); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .week-nav { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.2); border-radius: var(--radius-sm); padding: 4px 6px; }
  .week-nav button { background: none; border: none; color: rgba(255,255,255,.8); cursor: pointer; width: 30px; height: 30px; border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 14px; }
  .week-nav button:hover { background: rgba(255,255,255,.15); color: #fff; }
  .week-label { font-size: 13px; font-weight: 600; color: #fff; min-width: 170px; text-align: center; font-family: 'JetBrains Mono', monospace; }

  .week-today-row { display: flex; align-items: center; gap: 10px; }
  .btn-today { background: rgba(255,255,255,.22); border: 1px solid rgba(255,255,255,.35); color: #fff; cursor: pointer; padding: 5px 14px; border-radius: 20px; font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: .3px; transition: all .15s; white-space: nowrap; }
  .btn-today:hover { background: rgba(255,255,255,.38); }
  .btn-today.is-current-week { opacity: .35; cursor: default; pointer-events: none; }

  .btn-header { padding: 7px 14px; border-radius: var(--radius-xs); border: 1px solid rgba(255,255,255,.25); background: rgba(255,255,255,.12); color: #fff; font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; backdrop-filter: blur(8px); }
  .btn-header:hover { background: rgba(255,255,255,.22); }
  .btn { padding: 7px 14px; border-radius: var(--radius-xs); border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { background: var(--surface-3); }
  .btn-primary { background: var(--cut-primary); border-color: var(--cut-primary); color: #fff; }
  .btn-primary:hover { background: #6a7f90; }

  .legend-bar { display: flex; align-items: center; gap: 20px; padding: 10px 32px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 13px; box-shadow: var(--shadow-xs); }
  .legend-item { display: flex; align-items: center; gap: 7px; font-weight: 500; color: var(--text-secondary); }
  .legend-swatch { width: 28px; height: 16px; border-radius: 4px; border: 1px solid var(--border); }
  .legend-swatch.cut { background: var(--cut-cell-bg); }
  .legend-swatch.print { background: var(--print-cell-bg); }
  .legend-swatch.combo { background: #eae5ee; position: relative; overflow: hidden; }
  .legend-swatch.combo::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, var(--cut-cell-bg) 50%, var(--print-cell-bg) 50%); }
  .legend-people { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  .person-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: all .15s; user-select: none; }
  .person-chip:hover { background: var(--surface-3); }
  .person-chip.active { border-color: var(--text-secondary); background: var(--text); color: #fff; box-shadow: var(--shadow-sm); }
  .person-chip.active .dot { border: 1.5px solid #fff; }
  .person-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  .shift-cell.dimmed > * { opacity: 0.12; }
  .shift-cell.dimmed { pointer-events: none; }
  .shift-cell.dimmed:hover { filter: none; }
  .mobile-card.dimmed > * { opacity: 0.12; }
  .mobile-card.dimmed { pointer-events: none; }

  .override-dot {
    position: absolute; top: 3px; right: 4px;
    font-size: 7px; color: var(--accent);
    line-height: 1; z-index: 2;
  }

  /* Save scope modal */
  .scope-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(74,69,64,.3); backdrop-filter: blur(4px);
    z-index: 1100; align-items: center; justify-content: center;
  }
  .scope-overlay.active { display: flex; }
  .scope-modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 340px; max-width: 90vw;
    box-shadow: var(--shadow-lg); animation: modalIn .2s ease;
    text-align: center; padding: 24px 20px 18px;
  }
  .scope-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .scope-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; }
  .scope-btns { display: flex; flex-direction: column; gap: 8px; }
  .scope-btn {
    padding: 12px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-family: inherit;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .15s; display: flex; align-items: center;
    justify-content: center; gap: 8px;
  }
  .scope-btn:hover { background: var(--surface-3); }
  .scope-btn .scope-icon { font-size: 16px; }
  .scope-btn.scope-all {
    background: var(--cut-primary); border-color: var(--cut-primary);
    color: #fff;
  }
  .scope-btn.scope-all:hover { background: #6a7f90; }

  .scope-all-section { display: flex; flex-direction: column; gap: 6px; }
  .scope-pw-row { display: flex; gap: 6px; }
  .scope-pw-input {
    flex: 1; padding: 8px 12px; border-radius: var(--radius-xs);
    border: 1px solid var(--border); background: var(--surface-2);
    color: var(--text); font-family: inherit; font-size: 13px;
  }
  .scope-pw-input:focus { outline: none; border-color: var(--cut-primary); }
  .scope-pw-confirm {
    padding: 8px 16px; border-radius: var(--radius-xs);
    border: none; background: var(--cut-primary); color: #fff;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .scope-pw-confirm:hover { background: #6a7f90; }
  .scope-pw-error { font-size: 12px; color: var(--danger); text-align: center; animation: modalIn .2s ease; }

  .schedule-wrapper { padding: 24px 32px 40px; }
  .schedule-grid { display: grid; grid-template-columns: 110px repeat(7, 1fr); gap: 0; background: var(--surface); border-radius: var(--radius); overflow: visible; box-shadow: var(--shadow-lg); min-width: 980px; border: 1px solid var(--border); }
  .grid-header { background: var(--surface-2); padding: 14px 8px; text-align: center; font-weight: 600; font-size: 14px; border-bottom: 2px solid var(--border-light); border-right: 1px solid var(--border); }
  .grid-header.time-col { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; }
  .grid-header.is-today { background: var(--cut-label-bg); }
  .day-name { font-size: 15px; color: var(--text); }
  .day-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .today-badge { display: inline-block; background: var(--cut-primary); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: 5px; vertical-align: middle; }

  .time-cell { background: var(--surface-2); padding: 10px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; border-right: 2px solid var(--border); border-bottom: 1px solid var(--border); }
  .time-range { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.4; }
  .time-note { font-size: 10px; color: var(--text-muted); text-align: center; }

  .shift-cell { padding: 7px 6px; min-height: 76px; display: flex; flex-direction: column; gap: 0; cursor: pointer; position: relative; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: filter .12s; background: var(--surface); overflow: visible; }
  .shift-cell:hover { filter: brightness(.97); }
  .shift-cell.no-shift { background: var(--surface-3); cursor: pointer; }
  .shift-cell.no-shift:hover { background: var(--border); }

  .cell-cut-area { background: var(--cut-cell-bg); border-radius: var(--radius-xs) var(--radius-xs) 0 0; padding: 5px 6px; flex: 1; }
  .cell-print-area { background: var(--print-cell-bg); border-radius: 0 0 var(--radius-xs) var(--radius-xs); padding: 5px 6px; flex: 1; border-top: 1px solid var(--border); }
  .cell-cut-only { background: var(--cut-cell-bg); border-radius: var(--radius-xs); padding: 5px 6px; flex: 1; }
  .cell-print-only { background: var(--print-cell-bg); border-radius: var(--radius-xs); padding: 5px 6px; flex: 1; }

  .cell-combo {
    background: #eae5ee;
    border-radius: var(--radius-xs);
    padding: 6px 6px 6px 12px;
    flex: 1;
    position: relative;
  }
  .cell-combo::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, var(--cut-cell-bg) 50%, var(--print-cell-bg) 50%);
    border-radius: var(--radius-xs) 0 0 var(--radius-xs);
  }

  .role-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 1px 5px; border-radius: 3px; display: inline-flex; align-items: center; gap: 4px; width: fit-content; margin-bottom: 3px; }
  .role-label.cut { color: var(--cut-label-text); background: var(--cut-label-bg); }
  .role-label.print { color: var(--print-label-text); background: var(--print-label-bg); }
  .role-label.combo {
    color: #6b5888;
    background: #d8d0e2;
  }
  .role-label svg { width: 9px; height: 9px; }
  .person-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .person-tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: var(--radius-xs); font-size: 13px; font-weight: 600; position: relative; transition: all .12s; border: 1px solid; word-break: keep-all; }
  .person-tag .pname { font-weight: 600; white-space: nowrap; }
  .person-tag .note { font-size: 10px; font-weight: 400; opacity: .7; white-space: nowrap; }
  .person-tag:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .tooltip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%) translateY(4px); background: var(--text); color: #fff; padding: 4px 10px; border-radius: var(--radius-xs); font-size: 11px; font-weight: 500; white-space: nowrap; opacity: 0; pointer-events: none; transition: all .15s; z-index: 50; box-shadow: var(--shadow-md); }
  .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--text); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(74,69,64,.3); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 440px; max-width: 95vw; box-shadow: var(--shadow-lg); animation: modalIn .2s ease; }
  @keyframes modalIn { from { transform: scale(.96) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--text); }
  .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; width: 30px; height: 30px; border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; transition: all .12s; }
  .modal-close:hover { background: var(--surface-3); color: var(--text); }
  .modal-body { padding: 18px 22px; }
  .form-section { margin-bottom: 18px; } .form-section:last-child { margin-bottom: 0; }
  .form-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .form-section-title svg { width: 14px; height: 14px; flex-shrink: 0; }
  .form-section-title.cut { color: var(--cut-label-text); } .form-section-title.print { color: var(--print-label-text); }
  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .form-input { flex: 1; padding: 8px 12px; border-radius: var(--radius-xs); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 14px; transition: all .15s; }
  .form-input:focus { outline: none; border-color: var(--cut-primary); box-shadow: 0 0 0 3px rgba(122,143,160,.15); }
  .form-input::placeholder { color: var(--text-dim); } .form-input.note-input { flex: 0.7; font-size: 12px; }
  .btn-add-person { background: none; border: 1px dashed var(--border-light); color: var(--text-muted); padding: 6px 12px; border-radius: var(--radius-xs); cursor: pointer; font-size: 12px; font-family: inherit; transition: all .12s; }
  .btn-add-person:hover { border-color: var(--cut-primary); color: var(--cut-primary); background: var(--cut-cell-bg); }
  .btn-remove { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 15px; width: 28px; height: 28px; border-radius: var(--radius-xs); display: flex; align-items: center; justify-content: center; opacity: 0.5; transition: all .12s; flex-shrink: 0; }
  .btn-remove:hover { opacity: 1; background: #f5e0dc; }
  .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  .notes-section { margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 22px; box-shadow: var(--shadow-sm); }
  .notes-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .notes-content { font-size: 13px; line-height: 1.8; color: var(--text-muted); }

  /* Mobile schedule - hidden on desktop */
  .mobile-schedule { display: none; }
  @media (max-width: 768px) {
    .app-header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .header-left { gap: 10px; }
    .logo-icon { width: 36px; height: 36px; font-size: 18px; }
    .header-title { font-size: 17px; }
    .header-subtitle { font-size: 11px; }
    .header-right { width: 100%; justify-content: space-between; }
    .week-today-row { flex: 1; }
    .week-nav { flex: 1; }
    .week-label { min-width: 0; font-size: 12px; flex: 1; }
    .btn-today { font-size: 11px; padding: 4px 10px; }
    .btn-header { font-size: 11px; padding: 5px 10px; }

    .legend-bar { padding: 8px 16px; gap: 10px; flex-wrap: wrap; }
    .legend-item { font-size: 12px; }
    .legend-item:last-of-type span { font-size: 11px; }
    .legend-people { margin-left: 0; width: 100%; gap: 5px; }
    .person-chip { font-size: 11px; padding: 3px 8px; }

    .schedule-wrapper { padding: 12px 8px 30px; }

    /* Hide desktop grid, show mobile view */
    #scheduleGrid { display: none !important; }
    .mobile-schedule { display: block !important; }

    .notes-section { margin-top: 16px; padding: 12px 16px; }
    .notes-title { font-size: 12px; }
    .notes-content { font-size: 12px; line-height: 1.6; }

    .modal { width: 95vw; border-radius: 12px; }
    .modal-header { padding: 14px 16px 10px; }
    .modal-header h3 { font-size: 15px; }
    .modal-body { padding: 14px 16px; }
    .form-input { font-size: 13px; padding: 7px 10px; }
    .modal-footer { padding: 10px 16px; }
  }

  /* Mobile schedule styles */

  .mobile-day-nav {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
  }
  .mobile-day-nav button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-secondary); cursor: pointer; width: 36px; height: 36px;
    border-radius: var(--radius-xs); display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: all .15s; flex-shrink: 0;
  }
  .mobile-day-nav button:hover { background: var(--surface-3); }
  .mobile-day-tabs {
    display: flex; gap: 4px; flex: 1; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .mobile-day-tabs::-webkit-scrollbar { display: none; }
  .mobile-day-tab {
    padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary);
    cursor: pointer; white-space: nowrap; transition: all .15s; text-align: center;
    min-width: 48px; flex-shrink: 0;
  }
  .mobile-day-tab.active {
    background: var(--text); color: #fff; border-color: var(--text);
  }
  .mobile-day-tab.is-today {
    border-color: var(--cut-primary);
  }
  .mobile-day-tab .tab-day { font-weight: 600; }
  .mobile-day-tab .tab-date { font-size: 10px; opacity: .7; }

  .mobile-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow-sm); margin-bottom: 8px;
  }
  .mobile-card-header {
    padding: 8px 14px; background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; justify-content: space-between;
  }
  .mobile-card-header .time-note-m { font-size: 10px; color: var(--text-muted); font-family: 'Noto Sans TC', sans-serif; font-weight: 400; }
  .mobile-card-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
  .mobile-card-body .cell-cut-area,
  .mobile-card-body .cell-print-area,
  .mobile-card-body .cell-cut-only,
  .mobile-card-body .cell-print-only,
  .mobile-card-body .cell-combo { border-radius: var(--radius-xs); padding: 8px 10px; }
  .mobile-card-body .cell-cut-area { border-radius: var(--radius-xs) var(--radius-xs) 0 0; }
  .mobile-card-body .cell-print-area { border-radius: 0 0 var(--radius-xs) var(--radius-xs); }
  .mobile-card-body .cell-combo { padding-left: 14px; }
  .mobile-card-empty { padding: 14px; text-align: center; color: var(--text-dim); font-size: 12px; }

  /* Mobile view toggle */
  .mobile-view-toggle {
    display: flex; gap: 4px; margin-bottom: 12px;
    background: var(--surface-2); border-radius: var(--radius-sm);
    padding: 3px; border: 1px solid var(--border);
  }
  .mobile-view-btn {
    flex: 1; padding: 6px 0; border: none; border-radius: var(--radius-xs);
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: var(--text-muted); background: transparent;
    cursor: pointer; transition: all .15s; text-align: center;
  }
  .mobile-view-btn.active {
    background: var(--surface); color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* Week overview - mirrors desktop layout, compressed to fit mobile */
  .mobile-week-grid {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
  }
  .mobile-week-grid .mw-table {
    display: grid;
    grid-template-columns: 38px repeat(7, 1fr);
    width: 100%;
  }
  .mw-header {
    background: var(--surface-2); padding: 5px 1px;
    text-align: center; font-size: 10px; font-weight: 600;
    color: var(--text); border-bottom: 2px solid var(--border-light);

  }
  .mw-header.is-today { background: var(--cut-label-bg); }
  .mw-header .mw-h-date { font-size: 8px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

  .mw-cell.mw-empty { background: var(--surface-3); }
  .mw-cell.dimmed > * { opacity: 0.12; }
  .mw-cell.dimmed { pointer-events: none; }

  /* Mini role sections inside mw-cell */
  .mw-cut-area {
    background: var(--cut-cell-bg);
    border-radius: 2px 2px 0 0;
    padding: 1px 2px;
  }
  .mw-print-area {
    background: var(--print-cell-bg);

  .mw-cut-only {

  .mw-print-only {

    border-radius: 2px;
    padding: 1px 2px;

  .mw-combo-area {

    border-radius: 2px;

  .mw-combo-area::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;

  .mw-person {

    padding: 0px 2px; border-radius: 2px;

</style>

<body>
<header class="app-header">
  <div class="header-left">
    <div class="logo-icon">✂</div>
    <div><div class="header-title">排班管理系統</div><div class="header-subtitle">切割 &amp; 印刷+妙麗 人員班表</div></div>
  </div>
  <div class="header-right">
    <div class="week-today-row">
      <div class="week-nav">
        <button onclick="changeWeek(-1)" title="上一週">◀</button>
        <span class="week-label" id="weekLabel"></span>
        <button onclick="changeWeek(1)" title="下一週">▶</button>
      </div>
      <button class="btn-today" id="btnToday" onclick="goToday()" title="回到本週">TODAY</button>

    <button class="btn-header" onclick="exportHTML()" title="下載目前班表為 HTML 檔案">⤓ 匯出</button>

  </div>
</header>
<div class="legend-bar">

  <div class="legend-item"><div class="legend-swatch print"></div><span>印+妙</span></div>
  <div class="legend-item"><div class="legend-swatch combo"></div><span>印+切（一人負責兩站）</span></div>

</div>
<div class="schedule-wrapper">

  <div class="mobile-schedule" id="mobileSchedule"></div>
  <div class="notes-section">
    <div class="notes-title">📋 備註</div>
    <div class="notes-content">
      切為海格+拆下料架，兩個切則可以一人操作一台。<br>
      印+妙為大灰+妙麗+存海格檔案。若只有印可做則去操作一台切割機，有空就切。<br>
      優先以讓機器保持動作為主，先放紙開始印+妙切再去做收紙或其他，速度使效率最大化。<br>
      當有檔案 QR 錯需打到 QRCode Notion 表格。
    </div>
  </div>
</div>
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">編輯班次</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveEdit()">儲存</button></div>
  </div>
</div>
<div class="scope-overlay" id="saveScopeModal">
  <div class="scope-modal">
    <div class="scope-title">儲存範圍</div>
    <div class="scope-desc">這次修改要套用到哪裡？</div>
    <div class="scope-btns">
      <button class="scope-btn" onclick="confirmSaveScope('this')">
        <span class="scope-icon">📅</span>僅這週
      </button>
      <div class="scope-all-section">
        <button class="scope-btn scope-all" id="scopeAllBtn" onclick="showScopePassword()">
          <span class="scope-icon">🔄</span>所有週（更新模板）
        </button>
        <div class="scope-pw-row" id="scopePwRow" style="display:none;">
          <input type="password" class="scope-pw-input" id="scopePwInput" placeholder="請輸入管理密碼" autocomplete="off" onkeydown="if(event.key==='Enter')confirmAllWithPassword()">
          <button class="scope-pw-confirm" onclick="confirmAllWithPassword()">確認</button>
        </div>
        <div class="scope-pw-error" id="scopePwError" style="display:none;">密碼錯誤</div>
      </div>
    </div>
  </div>
</div>
<script>
const DAYS = ['一','二','三','四','五','六','日'];
const TIME_SLOTS = [
  { id: 'early', label: '開機', time: '上班前', note: '' },
  { id: 't1', label: '08:00', time: '10:30', note: '' },
  { id: 't2', label: '10:30', time: '12:00', note: '' },
  { id: 't3', label: '12:00', time: '13:30', note: '' },

];
const PERSON_COLORS = {
  '黑': { bg: '#d6dde6', border: '#a8b5c4', text: '#4e6070' },

};
const DEFAULT_DATA = {
  'early-一': { cut: [{name:'黑',note:'主要'}], print: [{name:'黑',note:''}] },
  'early-二': { cut: [{name:'黑',note:'主要'}], print: [{name:'黑',note:''}] },
  'early-三': { cut: [{name:'黑',note:'主要'}], print: [{name:'黑',note:''}] },
  'early-四': { cut: [{name:'黑',note:'主要'}], print: [{name:'黑',note:''}] },
  'early-日': { cut: [{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't1-一': { cut: [{name:'安',note:''}], print: [{name:'黑',note:''}] },
  't1-二': { cut: [{name:'妤',note:''},{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't1-三': { cut: [{name:'安',note:''}], print: [{name:'黑',note:''}] },
  't1-四': { cut: [{name:'安',note:''}], print: [{name:'黑',note:''}] },
  't1-五': { cut: [{name:'安',note:'預'}], print: [{name:'尤',note:''}] },
  't1-六': { cut: [{name:'妤',note:'主要, 0830上班'}], print: [{name:'妤',note:''}] },
  't1-日': { cut: [{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't2-一': { cut: [{name:'妤',note:''},{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't2-二': { cut: [{name:'妤',note:''},{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't2-三': { cut: [{name:'安',note:''}], print: [{name:'黑',note:''}] },
  't2-四': { cut: [{name:'安',note:''},{name:'尤',note:'預'}], print: [{name:'黑',note:''}] },
  't2-五': { cut: [{name:'安',note:'預'}], print: [{name:'尤',note:''}] },
  't2-六': { cut: [{name:'妤',note:'主要'}], print: [{name:'妤',note:''}] },
  't2-日': { cut: [{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't3-一': { cut: [{name:'妤',note:''},{name:'黑',note:''}], print: [{name:'妤',note:''}] },
  't3-二': { cut: [{name:'黑',note:''}], print: [{name:'妤',note:'+代工'}] },
  't3-三': { cut: [{name:'安',note:''}], print: [{name:'黑',note:''}] },
  't3-四': { cut: [{name:'安',note:''},{name:'尤',note:'預'}], print: [{name:'黑',note:''}] },
  't3-五': { cut: [{name:'安',note:'預'}], print: [{name:'尤',note:''}] },
  't3-六': { cut: [{name:'妤',note:'主要'}], print: [{name:'妤',note:''}] },
  't3-日': { cut: [{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't4-一': { cut: [{name:'黑',note:''}], print: [{name:'妤',note:''}] },
  't4-二': { cut: [{name:'黑',note:''}], print: [{name:'妤',note:''},{name:'尤',note:'妤到1530'}] },
  't4-三': { cut: [{name:'真',note:''},{name:'黑',note:''}], print: [{name:'尤',note:''}] },
  't4-四': { cut: [{name:'尤',note:''},{name:'安',note:'預'}], print: [{name:'黑',note:''},{name:'妤',note:'1620上班'}] },
  't4-五': { cut: [{name:'真',note:'1620上班'}], print: [{name:'尤',note:''}] },
  't4-六': { cut: [{name:'妤',note:'主要'}], print: [{name:'妤',note:'到1530'}] },
  't4-日': { cut: [{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't5-一': { cut: [{name:'尤',note:''}], print: [] },
  't5-二': { cut: [{name:'尤',note:''}], print: [] },
  't5-三': { cut: [{name:'尤',note:''}], print: [] },
  't5-四': { cut: [{name:'妤',note:'到1920'},{name:'尤',note:'預'}], print: [] },
  't5-五': { cut: [{name:'真',note:''}], print: [{name:'尤',note:''}] },
  't6-一': { cut: [{name:'任',note:'專心猛切'}], print: [] },
  't6-二': { cut: [{name:'真',note:''}], print: [] },
  't6-三': { cut: [{name:'任',note:''}], print: [{name:'任',note:''}] },
  't6-四': { cut: [{name:'妤',note:'到1920'}], print: [] },
  't6-五': { cut: [{name:'真',note:'到1840'},{name:'任',note:''}], print: [{name:'任',note:''}] },
};

let scheduleData = {}, overrides = {}, currentWeekOffset = 0, editingCell = null, editingDateKey = null, filterPerson = null;
let mobileDay = 0;
const isMobile = () => window.innerWidth <= 768;

function init() { 
  loadData(); updateWeekLabel(); renderGrid(); renderMobile(); renderLegend(); updateTodayBtn(); applyFilter();
  window.addEventListener('resize', () => { if(isMobile()) { renderMobile(); applyFilter(); } });
}
function loadData() {
  const s = localStorage.getItem('scheduleData_v3');
  scheduleData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  const o = localStorage.getItem('scheduleOverrides');
  overrides = o ? JSON.parse(o) : {};
}
function saveData() { localStorage.setItem('scheduleData_v3', JSON.stringify(scheduleData)); }
function saveOverrides() { localStorage.setItem('scheduleOverrides', JSON.stringify(overrides)); }
function resetToDefault() { if (confirm('確定要還原為預設班表嗎？所有臨時調整也會清除。')) { scheduleData = JSON.parse(JSON.stringify(DEFAULT_DATA)); overrides = {}; saveData(); saveOverrides(); renderGrid(); renderMobile(); renderLegend(); applyFilter(); } }

/* Get date string key for overrides: "2026-04-21" */
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

/* Get cell data: override first, then template */
function getCellData(slotId, day, dates, dayIndex) {
  const dk = `${dateStr(dates[dayIndex])}_${slotId}`;
  if (overrides[dk]) return { data: overrides[dk], isOverride: true, dateKey: dk };
  const tk = `${slotId}-${day}`;
  return { data: scheduleData[tk] || null, isOverride: false, dateKey: dk };
}
function getWeekDates(offset) { const now=new Date(),dow=now.getDay(),mo=new Date(now); mo.setDate(now.getDate()+(dow===0?-6:1-dow)+offset*7); return Array.from({length:7},(_,i)=>{const d=new Date(mo);d.setDate(mo.getDate()+i);return d;}); }
function updateWeekLabel() { const d=getWeekDates(currentWeekOffset),f=d=>`${d.getMonth()+1}/${d.getDate()}`; document.getElementById('weekLabel').textContent=`${d[0].getFullYear()} ${f(d[0])} — ${f(d[6])}`; }
function updateTodayBtn() { const b=document.getElementById('btnToday'); currentWeekOffset===0?b.classList.add('is-current-week'):b.classList.remove('is-current-week'); }
function changeWeek(dir) { currentWeekOffset+=dir; mobileDayUserSelected=false; updateWeekLabel(); renderGrid(); renderMobile(); updateTodayBtn(); applyFilter(); }
function goToday() { if(currentWeekOffset===0)return; currentWeekOffset=0; mobileDayUserSelected=false; updateWeekLabel(); renderGrid(); renderMobile(); updateTodayBtn(); applyFilter(); }

function ps(name) { const c=PERSON_COLORS[name]; return c?`background:${c.bg};border-color:${c.border};color:${c.text}`:'background:var(--surface-3);border-color:var(--border);color:var(--text-secondary)'; }
function personTagsHTML(people) { return people.map(p=>`<span class="person-tag" style="${ps(p.name)}"><span class="pname">${p.name}</span>${p.note?`<span class="note">${p.note}</span><span class="tooltip">${p.note}</span>`:''}</span>`).join(''); }
function isCombo(cd) { if(!cd)return false; const c=cd.cut||[],p=cd.print||[]; return c.length===1&&p.length===1&&c[0].name===p[0].name; }

const svgCut=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg>`;
const svgPrint=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>`;
const svgCombo=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;

function renderGrid() {
  const g=document.getElementById('scheduleGrid'); g.innerHTML='';
  const dates=getWeekDates(currentWeekOffset),today=new Date(); today.setHours(0,0,0,0);
  g.innerHTML+=`<div class="grid-header time-col">時段</div>`;
  dates.forEach((date,i)=>{const t=date.toDateString()===today.toDateString(); g.innerHTML+=`<div class="grid-header${t?' is-today':''}"><div class="day-name">${DAYS[i]}${t?'<span class="today-badge">TODAY</span>':''}</div><div class="day-date">${date.getMonth()+1}/${date.getDate()}</div></div>`;});

  TIME_SLOTS.forEach(slot=>{
    g.innerHTML+=`<div class="time-cell"><div class="time-range">${slot.label}${slot.time?'<br>~ '+slot.time:''}</div>${slot.note?`<div class="time-note">${slot.note}</div>`:''}</div>`;
    DAYS.forEach((day,di)=>{
      const cell=getCellData(slot.id,day,dates,di);
      const cd=cell.data, dk=cell.dateKey;
      const templateKey=`${slot.id}-${day}`;
      if(!cd){g.innerHTML+=`<div class="shift-cell no-shift" onclick="openEdit('${templateKey}','${slot.label} ~ ${slot.time}','${day}',${di})"></div>`;return;}
      const hasCut=cd.cut?.length>0,hasPrint=cd.print?.length>0;
      const overrideTag=cell.isOverride?'<span class="override-dot" title="臨時調整">●</span>':'';
      let h=`<div class="shift-cell" onclick="openEdit('${templateKey}','${slot.label} ~ ${slot.time}','${day}',${di})">${overrideTag}`;

      if(isCombo(cd)){
        const person=cd.cut[0],allNotes=[cd.cut[0].note,cd.print[0].note].filter(n=>n).join(', ');
        h+=`<div class="cell-combo"><div class="role-label combo">${svgCombo} 印+切</div>`;
        h+=`<div class="person-tags"><span class="person-tag" style="${ps(person.name)}"><span class="pname">${person.name}</span>${allNotes?`<span class="note">${allNotes}</span><span class="tooltip">${allNotes}</span>`:''}</span></div></div>`;
      } else if(hasCut&&hasPrint){
        h+=`<div class="cell-cut-area"><div class="role-label cut">${svgCut} 切割</div><div class="person-tags">${personTagsHTML(cd.cut)}</div></div>`;
        h+=`<div class="cell-print-area"><div class="role-label print">${svgPrint} 印+妙</div><div class="person-tags">${personTagsHTML(cd.print)}</div></div>`;
      } else if(hasCut){
        h+=`<div class="cell-cut-only"><div class="role-label cut">${svgCut} 切割</div><div class="person-tags">${personTagsHTML(cd.cut)}</div></div>`;
      } else if(hasPrint){
        h+=`<div class="cell-print-only"><div class="role-label print">${svgPrint} 印+妙</div><div class="person-tags">${personTagsHTML(cd.print)}</div></div>`;
      }
      g.innerHTML+=h+`</div>`;
    });
  });
}

let mobileView = 'day';
let mobileDayUserSelected = false;

function renderMobile() {
  const m = document.getElementById('mobileSchedule');
  if (!m) return;
  const dates = getWeekDates(currentWeekOffset);
  const today = new Date(); today.setHours(0,0,0,0);
  // Only auto-select today if user hasn't manually picked a day
  if (!mobileDayUserSelected && currentWeekOffset === 0) {
    const todayIdx = dates.findIndex(d => d.toDateString() === today.toDateString());
    if (todayIdx >= 0) mobileDay = todayIdx;
  }

  // View toggle
  let h = `<div class="mobile-view-toggle">`;
  h += `<button class="mobile-view-btn${mobileView==='day'?' active':''}" onclick="switchMobileView('day')">單日檢視</button>`;
  h += `<button class="mobile-view-btn${mobileView==='week'?' active':''}" onclick="switchMobileView('week')">週總覽</button>`;
  h += `</div>`;

  if (mobileView === 'day') {
    h += renderMobileDay(dates, today);
  } else {
    h += renderMobileWeek(dates, today);
  }
  m.innerHTML = h;
}

function renderMobileDay(dates, today) {
  let h = `<div class="mobile-day-nav"><div class="mobile-day-tabs">`;
  dates.forEach((date, i) => {
    const isToday = date.toDateString() === today.toDateString();
    const isActive = mobileDay === i;
    h += `<div class="mobile-day-tab${isActive?' active':''}${isToday?' is-today':''}" onclick="selectMobileDay(${i})">`;
    h += `<div class="tab-day">${DAYS[i]}</div><div class="tab-date">${date.getMonth()+1}/${date.getDate()}</div></div>`;
  });
  h += `</div></div>`;

  const day = DAYS[mobileDay];
  TIME_SLOTS.forEach(slot => {
    const templateKey = `${slot.id}-${day}`;
    const cell = getCellData(slot.id, day, dates, mobileDay);
    const cd = cell.data;
    const timeStr = `${slot.label} ~ ${slot.time}`;
    const overrideTag = cell.isOverride ? ' <span style="color:var(--accent);font-size:9px">●</span>' : '';
    h += `<div class="mobile-card" onclick="openEdit('${templateKey}','${timeStr}','${day}',${mobileDay})">`;
    h += `<div class="mobile-card-header"><span>${slot.label} ~ ${slot.time}${overrideTag}</span>${slot.note?`<span class="time-note-m">${slot.note}</span>`:''}</div>`;
    if (!cd) {
      h += `<div class="mobile-card-empty">無排班</div>`;
    } else {
      h += `<div class="mobile-card-body">`;
      const hasCut=cd.cut?.length>0, hasPrint=cd.print?.length>0;
      if (isCombo(cd)) {
        const person=cd.cut[0], allNotes=[cd.cut[0].note,cd.print[0].note].filter(n=>n).join(', ');
        h += `<div class="cell-combo"><div class="role-label combo">${svgCombo} 印+切</div>`;
        h += `<div class="person-tags"><span class="person-tag" style="${ps(person.name)}"><span class="pname">${person.name}</span>${allNotes?`<span class="note">${allNotes}</span>`:''}</span></div></div>`;
      } else {
        if (hasCut) h += `<div class="${hasPrint?'cell-cut-area':'cell-cut-only'}"><div class="role-label cut">${svgCut} 切割</div><div class="person-tags">${personTagsHTML(cd.cut)}</div></div>`;
        if (hasPrint) h += `<div class="${hasCut?'cell-print-area':'cell-print-only'}"><div class="role-label print">${svgPrint} 印+妙</div><div class="person-tags">${personTagsHTML(cd.print)}</div></div>`;
      }
      h += `</div>`;
    }
    h += `</div>`;
  });
  return h;
}

function renderMobileWeek(dates, today) {
  let h = `<div class="mobile-week-grid"><div class="mw-table">`;

  h += `<div class="mw-header mw-time-hdr">時段</div>`;
  dates.forEach((date, i) => {
    const t = date.toDateString() === today.toDateString();
    h += `<div class="mw-header${t?' is-today':''}"><div>${DAYS[i]}</div><div class="mw-h-date">${date.getMonth()+1}/${date.getDate()}</div></div>`;
  });

  function mwPersons(people) {
    return people.map(p => {
      const c = PERSON_COLORS[p.name];
      const st = c ? `background:${c.bg};border-color:${c.border};color:${c.text}` : '';
      return `<span class="mw-person" style="${st}"><span class="pname">${p.name}</span>${p.note?`<span class="mw-note">${p.note}</span>`:''}</span>`;
    }).join('');
  }

  TIME_SLOTS.forEach(slot => {
    const shortTime = slot.label.replace(':00','').replace(':30',':30');
    h += `<div class="mw-time">${shortTime}</div>`;

    DAYS.forEach((day, di) => {
      const templateKey = `${slot.id}-${day}`;
      const cell = getCellData(slot.id, day, dates, di);
      const cd = cell.data;
      const timeStr = `${slot.label} ~ ${slot.time}`;

      if (!cd) {
        h += `<div class="mw-cell mw-empty" onclick="openEdit('${templateKey}','${timeStr}','${day}',${di})"></div>`;
        return;
      }

      h += `<div class="mw-cell" onclick="openEdit('${templateKey}','${timeStr}','${day}',${di})">`;
      const hasCut=cd.cut?.length>0, hasPrint=cd.print?.length>0;

      if (isCombo(cd)) {
        h += `<div class="mw-combo-area"><div class="mw-role combo">印+切</div>${mwPersons(cd.cut)}</div>`;
      } else if (hasCut && hasPrint) {
        h += `<div class="mw-cut-area"><div class="mw-role cut">切割</div>${mwPersons(cd.cut)}</div>`;
        h += `<div class="mw-print-area"><div class="mw-role print">印+妙</div>${mwPersons(cd.print)}</div>`;
      } else if (hasCut) {
        h += `<div class="mw-cut-only"><div class="mw-role cut">切割</div>${mwPersons(cd.cut)}</div>`;
      } else if (hasPrint) {
        h += `<div class="mw-print-only"><div class="mw-role print">印+妙</div>${mwPersons(cd.print)}</div>`;
      }
      h += `</div>`;
    });
  });

  h += `</div></div>`;
  return h;
}

function switchMobileView(view) {
  mobileView = view;
  renderMobile();
  applyFilter();
}

function selectMobileDay(idx) {
  mobileDay = idx;
  mobileDayUserSelected = true;
  renderMobile();
  applyFilter();
}

function renderLegend() {
  const c=document.getElementById('legendPeople'),ppl=new Set();
  Object.values(scheduleData).forEach(cell=>{(cell.cut||[]).forEach(p=>ppl.add(p.name));(cell.print||[]).forEach(p=>ppl.add(p.name));});
  c.innerHTML=[...ppl].map(n=>{const cl=PERSON_COLORS[n]; const isActive=filterPerson===n; return `<span class="person-chip${isActive?' active':''}" onclick="toggleFilter('${n}')"><span class="dot" style="background:${cl?cl.border:'#aaa'}"></span>${n}</span>`;}).join('');
}

function toggleFilter(name) {
  filterPerson = filterPerson === name ? null : name;
  renderLegend();
  applyFilter();
}

function applyFilter() {
  // Desktop grid
  document.querySelectorAll('.shift-cell').forEach(cell => {
    if (!filterPerson) { cell.classList.remove('dimmed'); return; }
    const tags = cell.querySelectorAll('.pname');
    if (tags.length === 0) { cell.classList.add('dimmed'); return; }
    const names = [...tags].map(t => t.textContent);
    names.includes(filterPerson) ? cell.classList.remove('dimmed') : cell.classList.add('dimmed');
  });
  // Mobile day cards
  document.querySelectorAll('.mobile-card').forEach(card => {
    if (!filterPerson) { card.classList.remove('dimmed'); return; }
    const tags = card.querySelectorAll('.pname');
    if (tags.length === 0) { card.classList.add('dimmed'); return; }
    const names = [...tags].map(t => t.textContent);
    names.includes(filterPerson) ? card.classList.remove('dimmed') : card.classList.add('dimmed');
  });
  // Mobile week cells
  document.querySelectorAll('.mw-cell').forEach(cell => {
    if (!filterPerson) { cell.classList.remove('dimmed'); return; }
    const tags = cell.querySelectorAll('.pname');
    if (tags.length === 0) { cell.classList.add('dimmed'); return; }
    const names = [...tags].map(t => t.textContent);
    names.includes(filterPerson) ? cell.classList.remove('dimmed') : cell.classList.add('dimmed');
  });
}

function openEdit(templateKey,timeLabel,day,dayIndex){
  editingCell=templateKey;
  const dates=getWeekDates(currentWeekOffset);
  const slotId=templateKey.split('-')[0];
  const cell=getCellData(slotId,day,dates,dayIndex);
  editingDateKey=cell.dateKey;
  const data=cell.data||{cut:[],print:[]};
  document.getElementById('modalTitle').textContent=`編輯｜週${day}・${timeLabel}`;
  let h=`<div class="form-section"><div class="form-section-title cut">${svgCut} 切割人員</div><div id="cutRows">`;
  (data.cut||[]).forEach((p,i)=>{h+=pRow('cut',i,p.name,p.note);});
  h+=`</div><button class="btn-add-person" onclick="addPerson('cut')">+ 新增切割人員</button></div>`;
  h+=`<div class="form-section"><div class="form-section-title print">${svgPrint} 印+妙人員</div><div id="printRows">`;
  (data.print||[]).forEach((p,i)=>{h+=pRow('print',i,p.name,p.note);});
  h+=`</div><button class="btn-add-person" onclick="addPerson('print')">+ 新增印+妙人員</button></div>`;
  document.getElementById('modalBody').innerHTML=h;
  document.getElementById('editModal').classList.add('active');
}

function pRow(role,i,name,note){return `<div class="form-row" data-role="${role}"><input class="form-input" type="text" placeholder="姓名" value="${name||''}" data-field="name"><input class="form-input note-input" type="text" placeholder="備註（選填）" value="${note||''}" data-field="note"><button class="btn-remove" onclick="this.parentElement.remove()">✕</button></div>`;}
function addPerson(role){const c=document.getElementById(role+'Rows');c.insertAdjacentHTML('beforeend',pRow(role,0,'',''));c.lastElementChild.querySelector('input').focus();}

function saveEdit(){
  const cut=[],print=[];
  document.querySelectorAll('#cutRows .form-row').forEach(r=>{const n=r.querySelector('[data-field="name"]').value.trim(),t=r.querySelector('[data-field="note"]').value.trim();if(n)cut.push({name:n,note:t});});
  document.querySelectorAll('#printRows .form-row').forEach(r=>{const n=r.querySelector('[data-field="name"]').value.trim(),t=r.querySelector('[data-field="note"]').value.trim();if(n)print.push({name:n,note:t});});
  const newData = (!cut.length&&!print.length) ? null : {cut,print};
  // Store keys before closing modal
  window._pendingSaveCell = editingCell;
  window._pendingSaveDateKey = editingDateKey;
  closeModal();
  showSaveScope(newData);
}

function showSaveScope(newData) {
  const overlay = document.getElementById('saveScopeModal');
  overlay.classList.add('active');
  window._pendingSave = newData;
  document.getElementById('scopePwRow').style.display = 'none';
  document.getElementById('scopePwError').style.display = 'none';
  document.getElementById('scopePwInput').value = '';
}

function showScopePassword() {
  document.getElementById('scopePwRow').style.display = 'flex';
  document.getElementById('scopePwError').style.display = 'none';
  document.getElementById('scopePwInput').value = '';
  setTimeout(() => document.getElementById('scopePwInput').focus(), 50);
}

function confirmAllWithPassword() {
  const input = document.getElementById('scopePwInput').value;
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  sha256(input).then(hash => {
    if (hash === '2eef75362c5d08a31384dedf71617445c31969f405ad2d554da73ad6fc5fe327') {
      confirmSaveScope('all');
    } else {
      document.getElementById('scopePwError').style.display = 'block';
      document.getElementById('scopePwInput').value = '';
      document.getElementById('scopePwInput').focus();
    }
  });
}

function confirmSaveScope(scope) {
  const newData = window._pendingSave;
  const cellKey = window._pendingSaveCell;
  const dateKey = window._pendingSaveDateKey;
  document.getElementById('saveScopeModal').classList.remove('active');

  if (scope === 'all') {
    if (newData) scheduleData[cellKey] = newData;
    else delete scheduleData[cellKey];
    delete overrides[dateKey];
    saveData(); saveOverrides();
  } else {
    if (newData) overrides[dateKey] = newData;
    else delete overrides[dateKey];
    saveOverrides();
  }

  renderGrid(); renderMobile(); renderLegend(); applyFilter();
  showToast(scope === 'all' ? '已更新所有週模板' : '已儲存本週調整');
  window._pendingSave = null;
  window._pendingSaveCell = null;
  window._pendingSaveDateKey = null;
}

function closeModal(){document.getElementById('editModal').classList.remove('active');editingCell=null;}
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('saveScopeModal').addEventListener('click',function(e){if(e.target===this){this.classList.remove('active');window._pendingSave=null;}});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();document.getElementById('saveScopeModal').classList.remove('active');}});

function exportHTML(){
  // Build new DEFAULT_DATA from current scheduleData
  let lines = [];
  const sortedKeys = Object.keys(scheduleData).sort((a,b) => {
    const order=['early','t1','t2','t3','t4','t5','t6'], dayOrder=['一','二','三','四','五','六','日'];
    const[aS,aD]=[a.split('-')[0],a.split('-')[1]],[bS,bD]=[b.split('-')[0],b.split('-')[1]];
    const si=order.indexOf(aS)-order.indexOf(bS);
    return si!==0?si:dayOrder.indexOf(aD)-dayOrder.indexOf(bD);
  });
  sortedKeys.forEach(key => {
    const d=scheduleData[key];
    const cs=(d.cut||[]).map(p=>`{name:'${p.name}',note:'${p.note}'}`).join(',');
    const pstr=(d.print||[]).map(p=>`{name:'${p.name}',note:'${p.note}'}`).join(',');
    lines.push(`  '${key}': { cut: [${cs}], print: [${pstr}] },`);
  });
  const nd=`const DEFAULT_DATA = {\n${lines.join('\n')}\n};`;

  // Fetch the original HTML source (not the rendered DOM)
  fetch(location.href.split('?')[0])
    .then(r => r.text())
    .then(src => {
      const result = src.replace(/const DEFAULT_DATA = \{[\s\S]*?\};/, nd);
      const blob = new Blob([result], {type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = '排班表.html';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      showToast('已匯出！將下載的檔案推上 GitHub 即可更新。');
    })
    .catch(() => {
      // Fallback: if fetch fails (e.g. local file), use outerHTML method
      const fullHTML = document.documentElement.outerHTML;
      const rp = fullHTML.replace(/const DEFAULT_DATA = \{[\s\S]*?\};/, nd);
      const out = `<!DOCTYPE html>\n<html lang="zh-TW">${rp.replace(/^<html[^>]*>/, '')}</html>`;
      const blob = new Blob([out], {type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = '排班表.html';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      showToast('已匯出（備用模式）');
    });
}

function showToast(msg){const t=document.createElement('div');t.textContent=msg;Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'var(--text)',color:'#fff',padding:'10px 22px',borderRadius:'8px',fontSize:'13px',fontWeight:'500',boxShadow:'0 4px 16px rgba(0,0,0,.15)',zIndex:'9999',animation:'modalIn .2s ease',fontFamily:"'Noto Sans TC',sans-serif"});document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);}

init();
