<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切割 & 印+妙 排班表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── Morandi base ── */
    --bg: #e8e4df;
    --surface: #f2efeb;
    --surface-2: #eae6e1;
    --surface-3: #ddd9d3;
    --border: #cdc8c1;
    --border-light: #bfb9b1;
    --text: #4a4540;
    --text-secondary: #6b655e;
    --text-muted: #928b82;
    --text-dim: #b5aea5;

    /* ── Cut = Morandi blue-grey ── */
    --cut-primary: #7a8fa0;
    --cut-header: #8fa3b4;
    --cut-cell-bg: #e8edf2;
    --cut-cell-hover: #dce4ec;
    --cut-label-bg: #cdd8e2;
    --cut-label-text: #506878;

    /* ── Print = Morandi warm rose ── */
    --print-primary: #b08a80;
    --print-header: #c09888;
    --print-cell-bg: #f2e8e4;
    --print-cell-hover: #ecddd7;
    --print-label-bg: #e0cec6;
    --print-label-text: #7a5548;

    /* ── Accent ── */
    --accent: #9a8db8;
    --success: #8fb09a;
    --danger: #c08078;

    --header-bg: linear-gradient(135deg, #8a9baa 0%, #9a8db8 100%);

    --shadow-xs: 0 1px 2px rgba(80,70,60,.06);
    --shadow-sm: 0 1px 4px rgba(80,70,60,.08);
    --shadow-md: 0 4px 12px rgba(80,70,60,.10);
    --shadow-lg: 0 8px 28px rgba(80,70,60,.12);

    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 5px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }

  /* ═══ Header ═══ */
  .app-header {
    background: var(--header-bg);
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(100,90,80,.18);
    position: sticky; top: 0; z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 42px; height: 42px;
    background: rgba(255,255,255,.2);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1px solid rgba(255,255,255,.25);
  }

  .header-title { font-size: 21px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .header-subtitle { font-size: 12px; color: rgba(255,255,255,.72); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .week-nav {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: var(--radius-sm);
    padding: 4px 6px;
  }

  .week-nav button {
    background: none; border: none; color: rgba(255,255,255,.8);
    cursor: pointer; width: 30px; height: 30px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-size: 14px;
  }
  .week-nav button:hover { background: rgba(255,255,255,.15); color: #fff; }

  .week-label {
    font-size: 13px; font-weight: 600; color: #fff;
    min-width: 170px; text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  .btn-header {
    padding: 7px 14px; border-radius: var(--radius-xs);
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.12); color: #fff;
    font-family: inherit; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; gap: 5px;
    backdrop-filter: blur(8px);
  }
  .btn-header:hover { background: rgba(255,255,255,.22); }

  .btn { padding: 7px 14px; border-radius: var(--radius-xs); border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { background: var(--surface-3); }

  .btn-primary { background: var(--cut-primary); border-color: var(--cut-primary); color: #fff; }
  .btn-primary:hover { background: #6a7f90; }

  /* ═══ Legend ═══ */
  .legend-bar {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    box-shadow: var(--shadow-xs);
  }

  .legend-item { display: flex; align-items: center; gap: 7px; font-weight: 500; color: var(--text-secondary); }

  .legend-swatch {
    width: 28px; height: 16px; border-radius: 4px; border: 1px solid var(--border);
  }
  .legend-swatch.cut { background: var(--cut-cell-bg); }
  .legend-swatch.print { background: var(--print-cell-bg); }

  .legend-people { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

  .person-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .person-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ═══ Schedule Grid ═══ */
  .schedule-wrapper { padding: 24px 32px 40px; }

  .schedule-grid {
    display: grid;
    grid-template-columns: 110px repeat(7, 1fr);
    gap: 0;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    min-width: 920px;
    border: 1px solid var(--border);
  }

  /* ═══ Header Row ═══ */
  .grid-header {
    background: var(--surface-2);
    padding: 14px 8px; text-align: center;
    font-weight: 600; font-size: 14px;
    border-bottom: 2px solid var(--border-light);
    border-right: 1px solid var(--border);
  }
  .grid-header:last-child { border-right: none; }

  .grid-header.time-col {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: center;
  }

  .grid-header.is-today { background: var(--cut-label-bg); }

  .day-name { font-size: 15px; color: var(--text); }
  .day-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

  .today-badge {
    display: inline-block;
    background: var(--cut-primary); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
    margin-left: 5px; vertical-align: middle;
  }

  /* ═══ Time Column ═══ */
  .time-cell {
    background: var(--surface-2);
    padding: 10px 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    border-right: 2px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .time-range {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--text); text-align: center; line-height: 1.4;
  }
  .time-note { font-size: 10px; color: var(--text-muted); text-align: center; }

  /* ═══ Shift Cell ═══ */
  .shift-cell {
    padding: 7px 6px; min-height: 76px;
    display: flex; flex-direction: column; gap: 0;
    cursor: pointer; position: relative;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transition: filter .12s;
    background: var(--surface);
  }
  .shift-cell:nth-child(8n) { border-right: none; }
  .shift-cell:hover { filter: brightness(.97); }

  .shift-cell.no-shift { background: var(--surface-3); cursor: pointer; }
  .shift-cell.no-shift:hover { background: var(--border); }

  /* ═══ Split Cell: top = cut, bottom = print ═══ */
  .cell-cut-area {
    background: var(--cut-cell-bg);
    border-radius: var(--radius-xs) var(--radius-xs) 0 0;
    padding: 5px 6px;
    flex: 1;
    min-height: 32px;
  }

  .cell-print-area {
    background: var(--print-cell-bg);
    border-radius: 0 0 var(--radius-xs) var(--radius-xs);
    padding: 5px 6px;
    flex: 1;
    min-height: 32px;
    border-top: 1px solid var(--border);
  }

  .cell-cut-only {
    background: var(--cut-cell-bg);
    border-radius: var(--radius-xs);
    padding: 5px 6px;
    flex: 1;
  }

  .cell-print-only {
    background: var(--print-cell-bg);
    border-radius: var(--radius-xs);
    padding: 5px 6px;
    flex: 1;
  }

  /* ═══ Role label + tags ═══ */
  .role-label {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 1px 5px; border-radius: 3px;
    display: inline-flex; align-items: center; gap: 4px;
    width: fit-content; margin-bottom: 3px;
  }
  .role-label.cut { color: var(--cut-label-text); background: var(--cut-label-bg); }
  .role-label.print { color: var(--print-label-text); background: var(--print-label-bg); }
  .role-label svg { width: 9px; height: 9px; }

  .person-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .person-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: var(--radius-xs);
    font-size: 13px; font-weight: 600;
    position: relative; transition: all .12s;
    border: 1px solid;
  }

  .person-tag .pname { font-weight: 600; }
  .person-tag .note { font-size: 10px; font-weight: 400; opacity: .7; }

  .person-tag:hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  .tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--text); color: #fff;
    padding: 4px 10px; border-radius: var(--radius-xs);
    font-size: 11px; font-weight: 500;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: all .15s; z-index: 50;
    box-shadow: var(--shadow-md);
  }
  .tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: var(--text);
  }

  /* ═══ Edit Modal ═══ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(74,69,64,.3);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 440px; max-width: 95vw;
    box-shadow: var(--shadow-lg);
    animation: modalIn .2s ease;
  }

  @keyframes modalIn {
    from { transform: scale(.96) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--text); }

  .modal-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 18px; width: 30px; height: 30px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    transition: all .12s;
  }
  .modal-close:hover { background: var(--surface-3); color: var(--text); }

  .modal-body { padding: 18px 22px; }

  .form-section { margin-bottom: 18px; }
  .form-section:last-child { margin-bottom: 0; }

  .form-section-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .form-section-title.cut { color: var(--cut-label-text); }
  .form-section-title.print { color: var(--print-label-text); }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }

  .form-input {
    flex: 1; padding: 8px 12px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: inherit; font-size: 14px;
    transition: all .15s;
  }
  .form-input:focus { outline: none; border-color: var(--cut-primary); box-shadow: 0 0 0 3px rgba(122,143,160,.15); }
  .form-input::placeholder { color: var(--text-dim); }
  .form-input.note-input { flex: 0.7; font-size: 12px; }

  .btn-add-person {
    background: none; border: 1px dashed var(--border-light);
    color: var(--text-muted); padding: 6px 12px;
    border-radius: var(--radius-xs); cursor: pointer;
    font-size: 12px; font-family: inherit; transition: all .12s;
  }
  .btn-add-person:hover { border-color: var(--cut-primary); color: var(--cut-primary); background: var(--cut-cell-bg); }

  .btn-remove {
    background: none; border: none; color: var(--danger);
    cursor: pointer; font-size: 15px; width: 28px; height: 28px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    opacity: 0.5; transition: all .12s; flex-shrink: 0;
  }
  .btn-remove:hover { opacity: 1; background: #f5e0dc; }

  .modal-footer {
    padding: 14px 22px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* ═══ Notes ═══ */
  .notes-section {
    margin-top: 20px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 22px; box-shadow: var(--shadow-sm);
  }

  .notes-title {
    font-size: 13px; font-weight: 700;
    color: var(--text-secondary); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }

  .notes-content { font-size: 13px; line-height: 1.8; color: var(--text-muted); }

  @media (max-width: 768px) {
    .app-header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .schedule-wrapper { padding: 12px; }
    .schedule-grid { grid-template-columns: 80px repeat(7, minmax(100px, 1fr)); }
    .legend-bar { padding: 10px 16px; flex-wrap: wrap; gap: 10px; }
    .legend-people { margin-left: 0; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <div class="logo-icon">✂</div>
    <div>
      <div class="header-title">排班管理系統</div>
      <div class="header-subtitle">切割 & 印刷+妙麗 人員班表</div>
    </div>
  </div>
  <div class="header-right">
    <div class="week-nav">
      <button onclick="changeWeek(-1)" title="上一週">◀</button>
      <span class="week-label" id="weekLabel"></span>
      <button onclick="changeWeek(1)" title="下一週">▶</button>
    </div>
    <button class="btn-header" onclick="exportHTML()" title="下載目前班表為 HTML 檔案">⤓ 匯出 HTML</button>
    <button class="btn-header" onclick="resetToDefault()" title="還原預設資料">↺ 還原預設</button>
  </div>
</header>

<div class="legend-bar">
  <div class="legend-item">
    <div class="legend-swatch cut"></div>
    <span>切割</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch print"></div>
    <span>印+妙</span>
  </div>
  <div class="legend-people" id="legendPeople"></div>
</div>

<div class="schedule-wrapper">
  <div class="schedule-grid" id="scheduleGrid"></div>
  <div class="notes-section">
    <div class="notes-title">📋 備註</div>
    <div class="notes-content">
      切為海格+拆下料架，兩個切則可以一人操作一台。<br>
      印+妙為大灰+妙麗+存海格檔案。若只有印可做則去操作一台切割機，有空就切。<br>
      優先以讓機器保持動作為主，先放紙開始印+妙切再去做收紙或其他，速度使效率最大化。<br>
      當有檔案 QR 錯需打到 QRCode Notion 表格。
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">編輯班次</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<script>

const TIME_SLOTS = [
  { id: 'early', label: '開機', time: '上班前', note: '' },
  { id: 't1', label: '08:00', time: '10:30', note: '' },

/* Morandi person colors */

const DEFAULT_DATA = {

  't3-二': { cut: [{name:'黑',note:''}], print: [{name:'小妤',note:'+代工'}] },

  't4-四': { cut: [{name:'尤',note:''},{name:'安',note:'預'}], print: [{name:'黑',note:''},{name:'妤',note:'1620上班'}] },
  't4-五': { cut: [{name:'真',note:'1620上班'}], print: [{name:'尤',note:''}] },
  't4-六': { cut: [{name:'妤',note:'主要'}], print: [{name:'妤',note:'到1530'}] },
  't4-日': { cut: [{name:'黑',note:''}], print: [{name:'黑',note:''}] },
  't5-一': { cut: [{name:'尤',note:''}], print: [] },
  't5-二': { cut: [{name:'尤',note:''}], print: [] },
  't5-三': { cut: [{name:'尤',note:''}], print: [] },
  't5-四': { cut: [{name:'妤',note:'到1920'},{name:'尤',note:'預'}], print: [] },
  't5-五': { cut: [{name:'真',note:''}], print: [{name:'尤',note:''}] },
  't6-一': { cut: [{name:'任',note:'專心猛切'}], print: [] },
  't6-二': { cut: [{name:'真',note:''}], print: [] },
  't6-三': { cut: [{name:'任',note:''}], print: [{name:'任',note:''}] },
  't6-四': { cut: [{name:'妤',note:'到1920'}], print: [] },
  't6-五': { cut: [{name:'真',note:'到1840'},{name:'任',note:''}], print: [{name:'任',note:''}] },
};

let scheduleData = {}, currentWeekOffset = 0, editingCell = null;

function init() { loadData(); updateWeekLabel(); renderGrid(); renderLegend(); }

function loadData() {
  const s = localStorage.getItem('scheduleData_v3');
  scheduleData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() { localStorage.setItem('scheduleData_v3', JSON.stringify(scheduleData)); }

function resetToDefault() {
  if (confirm('確定要還原為預設班表嗎？')) {
    scheduleData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(); renderGrid(); renderLegend();
  }
}

function getWeekDates(offset) {
  const now = new Date(), dow = now.getDay();
  const mo = new Date(now);
  mo.setDate(now.getDate() + (dow === 0 ? -6 : 1 - dow) + offset * 7);
  return Array.from({length:7}, (_,i) => { const d = new Date(mo); d.setDate(mo.getDate()+i); return d; });
}

function updateWeekLabel() {
  const d = getWeekDates(currentWeekOffset);
  const f = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('weekLabel').textContent = `${d[0].getFullYear()} ${f(d[0])} — ${f(d[6])}`;
}

function changeWeek(dir) { currentWeekOffset += dir; updateWeekLabel(); renderGrid(); }

function ps(name) {
  const c = PERSON_COLORS[name];
  return c ? `background:${c.bg};border-color:${c.border};color:${c.text}` : 'background:var(--surface-3);border-color:var(--border);color:var(--text-secondary)';
}

function personTagsHTML(people) {
  return people.map(p =>
    `<span class="person-tag" style="${ps(p.name)}"><span class="pname">${p.name}</span>${p.note?`<span class="note">${p.note}</span><span class="tooltip">${p.note}</span>`:''}</span>`
  ).join('');
}

function renderGrid() {
  const g = document.getElementById('scheduleGrid'); g.innerHTML = '';
  const dates = getWeekDates(currentWeekOffset);
  const today = new Date(); today.setHours(0,0,0,0);

  g.innerHTML += `<div class="grid-header time-col">時段</div>`;
  dates.forEach((date, i) => {
    const t = date.toDateString() === today.toDateString();
    g.innerHTML += `<div class="grid-header${t?' is-today':''}"><div class="day-name">${DAYS[i]}${t?'<span class="today-badge">TODAY</span>':''}</div><div class="day-date">${date.getMonth()+1}/${date.getDate()}</div></div>`;
  });

  TIME_SLOTS.forEach(slot => {
    g.innerHTML += `<div class="time-cell"><div class="time-range">${slot.label}${slot.time?'<br>~ '+slot.time:''}</div>${slot.note?`<div class="time-note">${slot.note}</div>`:''}</div>`;

    DAYS.forEach((day, di) => {
      const key = `${slot.id}-${day}`, cd = scheduleData[key];

      if (!cd) {
        g.innerHTML += `<div class="shift-cell no-shift" onclick="openEdit('${key}','${slot.label} ~ ${slot.time}','${day}')"></div>`;
        return;
      }

      const hasCut = cd.cut?.length > 0;
      const hasPrint = cd.print?.length > 0;

      let h = `<div class="shift-cell" onclick="openEdit('${key}','${slot.label} ~ ${slot.time}','${day}')">`;

      if (hasCut && hasPrint) {
        /* both: split top/bottom */
        h += `<div class="cell-cut-area">`;
        h += `<div class="role-label cut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg> 切割</div>`;
        h += `<div class="person-tags">${personTagsHTML(cd.cut)}</div></div>`;
        h += `<div class="cell-print-area">`;
        h += `<div class="role-label print"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg> 印+妙</div>`;
        h += `<div class="person-tags">${personTagsHTML(cd.print)}</div></div>`;
      } else if (hasCut) {
        h += `<div class="cell-cut-only">`;
        h += `<div class="role-label cut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg> 切割</div>`;
        h += `<div class="person-tags">${personTagsHTML(cd.cut)}</div></div>`;
      } else if (hasPrint) {
        h += `<div class="cell-print-only">`;
        h += `<div class="role-label print"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg> 印+妙</div>`;
        h += `<div class="person-tags">${personTagsHTML(cd.print)}</div></div>`;
      } else {
        h += `<div style="color:var(--text-dim);font-size:12px;display:flex;align-items:center;justify-content:center;height:100%">點擊編輯</div>`;
      }

      g.innerHTML += h + `</div>`;
    });
  });
}

function renderLegend() {
  const c = document.getElementById('legendPeople'), ppl = new Set();
  Object.values(scheduleData).forEach(cell => { (cell.cut||[]).forEach(p=>ppl.add(p.name)); (cell.print||[]).forEach(p=>ppl.add(p.name)); });
  c.innerHTML = [...ppl].map(n => { const cl = PERSON_COLORS[n]; return `<span class="person-chip"><span class="dot" style="background:${cl?cl.border:'#aaa'}"></span>${n}</span>`; }).join('');
}

function openEdit(key, timeLabel, day) {
  editingCell = key;
  const data = scheduleData[key] || { cut: [], print: [] };
  document.getElementById('modalTitle').textContent = `編輯｜週${day}・${timeLabel}`;

  let h = `<div class="form-section"><div class="form-section-title cut"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4L8.12 15.88M14.47 14.48L20 20M8.12 8.12L12 12"/></svg> 切割人員</div><div id="cutRows">`;
  (data.cut||[]).forEach((p,i) => { h += pRow('cut',i,p.name,p.note); });
  h += `</div><button class="btn-add-person" onclick="addPerson('cut')">+ 新增切割人員</button></div>`;

  h += `<div class="form-section"><div class="form-section-title print"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg> 印+妙人員</div><div id="printRows">`;
  (data.print||[]).forEach((p,i) => { h += pRow('print',i,p.name,p.note); });
  h += `</div><button class="btn-add-person" onclick="addPerson('print')">+ 新增印+妙人員</button></div>`;

  document.getElementById('modalBody').innerHTML = h;
  document.getElementById('editModal').classList.add('active');
}

function pRow(role, i, name, note) {
  return `<div class="form-row" data-role="${role}"><input class="form-input" type="text" placeholder="姓名" value="${name||''}" data-field="name"><input class="form-input note-input" type="text" placeholder="備註（選填）" value="${note||''}" data-field="note"><button class="btn-remove" onclick="this.parentElement.remove()">✕</button></div>`;
}

function addPerson(role) {
  const c = document.getElementById(role+'Rows');
  c.insertAdjacentHTML('beforeend', pRow(role,0,'',''));
  c.lastElementChild.querySelector('input').focus();
}

function saveEdit() {
  const cut=[], print=[];
  document.querySelectorAll('#cutRows .form-row').forEach(r => { const n=r.querySelector('[data-field="name"]').value.trim(), t=r.querySelector('[data-field="note"]').value.trim(); if(n) cut.push({name:n,note:t}); });
  document.querySelectorAll('#printRows .form-row').forEach(r => { const n=r.querySelector('[data-field="name"]').value.trim(), t=r.querySelector('[data-field="note"]').value.trim(); if(n) print.push({name:n,note:t}); });
  if(!cut.length && !print.length) delete scheduleData[editingCell]; else scheduleData[editingCell] = {cut,print};
  saveData(); renderGrid(); renderLegend(); closeModal();
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); editingCell = null; }

document.getElementById('editModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.addEventListener('keydown', function(e) { if(e.key==='Escape') closeModal(); });

function exportHTML() {
  // Read the current page's full HTML source
  // Then replace the DEFAULT_DATA block with current scheduleData
  const fullHTML = document.documentElement.outerHTML;

  // Build new DEFAULT_DATA string from current scheduleData
  let lines = [];
  const sortedKeys = Object.keys(scheduleData).sort((a, b) => {
    const order = ['early','t1','t2','t3','t4','t5','t6'];
    const dayOrder = ['一','二','三','四','五','六','日'];
    const [aSlot, aDay] = [a.split('-')[0], a.split('-')[1]];
    const [bSlot, bDay] = [b.split('-')[0], b.split('-')[1]];
    const si = order.indexOf(aSlot) - order.indexOf(bSlot);
    return si !== 0 ? si : dayOrder.indexOf(aDay) - dayOrder.indexOf(bDay);
  });

  sortedKeys.forEach(key => {
    const d = scheduleData[key];
    const cutStr = (d.cut||[]).map(p => `{name:'${p.name}',note:'${p.note}'}`).join(',');
    const printStr = (d.print||[]).map(p => `{name:'${p.name}',note:'${p.note}'}`).join(',');
    lines.push(`  '${key}': { cut: [${cutStr}], print: [${printStr}] },`);
  });

  const newDefault = `const DEFAULT_DATA = {\n${lines.join('\n')}\n};`;

  // Replace the old DEFAULT_DATA block
  const replaced = fullHTML.replace(
    /const DEFAULT_DATA = \{[\s\S]*?\};/,
    newDefault
  );

  // Build full document
  const output = `<!DOCTYPE html>\n<html lang="zh-TW">${replaced.replace(/^<html[^>]*>/, '')}</html>`;

  // Remove any localStorage reference so fresh load uses new DEFAULT_DATA
  const finalOutput = output.replace(
    /function loadData\(\) \{[\s\S]*?\}/,
    `function loadData() {\n  const s = localStorage.getItem('scheduleData_v3');\n  scheduleData = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));\n}`
  );

  // Download
  const blob = new Blob([finalOutput], { type: 'text/html; charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '排班表.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Show confirmation
  showToast('已匯出！將下載的檔案推上 GitHub 即可更新。');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '24px', left: '50%', transform: 'translateX(-50%)',
    background: 'var(--text)', color: '#fff', padding: '10px 22px',
    borderRadius: '8px', fontSize: '13px', fontWeight: '500',
    boxShadow: '0 4px 16px rgba(0,0,0,.15)', zIndex: '9999',
    animation: 'modalIn .2s ease', fontFamily: "'Noto Sans TC', sans-serif"
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

init();
</script>
